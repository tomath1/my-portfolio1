<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="icon" href="1.1.jpg">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: rgb(44, 62, 80);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* الكارت */
        .social-container {
            background: rgba(236, 240, 241, 0.6);
            padding: 30px;
            border-radius: 45px;
            max-width: 380px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* الإطار المتحرك */
        .social-container::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 45px;
            background: linear-gradient(270deg, #ff004c, #ffec00, #00ffee, #ff004c);
            background-size: 400% 400%;
            animation: glowing 6s linear infinite;
            z-index: -1;
        }

        @keyframes glowing {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* العنوان */
        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: rgb(44, 62, 80);
        }

        /* صورة البروفايل */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: block;
            margin: 10px auto;
            object-fit: cover;
            border: 4px solid white;
        }

        /* الاسم */
        .name {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* روابط السوشيال */
        .social-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin: 12px 0;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            color: inherit;
            transition: .3s;
        }

        .social-link img {
            width: 30px;
            height: 30px;
        }

        .social-link span {
            font-weight: bold;
        }

        .social-link:hover {
            transform: scale(1.05);
        }

        /* التابلت */
        @media (max-width:768px) {
            .profile-img {
                width: 100px;
                height: 100px;
            }

            .social-link {
                padding: 14px;
            }
        }

        /* الموبايل */
        @media (max-width:480px) {
            .social-container {
                padding: 25px;
                border-radius: 35px;
            }

            .profile-img {
                width: 90px;
                height: 90px;
            }

            .social-link {
                padding: 12px;
            }

            .social-link span {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
